<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>典藏庫房管理系統-企業協作版</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { background-color: #f1f3f5; padding-bottom: 60px; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
    .nav-tabs .nav-link { color: #495057; font-weight: bold; border-radius: 10px 10px 0 0; font-size: 0.9rem; padding: 10px 5px;}
    .nav-tabs .nav-link.active { background-color: #198754; color: white; border-color: #198754; }
    .step-card { display: none; background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-top: 15px;}
    .step-card.active { display: block; }
    .stat-box { text-align: center; background: #e9ecef; border-radius: 8px; padding: 10px; margin-bottom: 15px; }
    .stat-num { font-size: 1.5rem; font-weight: bold; }
    
    #reader-container { position: relative; width: 100%; border-radius: 15px; overflow: hidden; background: #000; margin-top: 12px; min-height: 300px;}
    #reader { width: 100% !important; border: none !important; }
    
    #resultOverlay { 
      position: absolute; top: 10px; left: 10px; right: 10px; 
      z-index: 100; display: none; 
      background: rgba(255, 255, 255, 0.92); 
      backdrop-filter: blur(5px);
      border-radius: 12px; padding: 15px; 
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      border: 2px solid #198754;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .result-img { max-width: 80px; max-height: 80px; object-fit: contain; border-radius: 5px; margin-right: 15px; }
    #loadingMask { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(255,255,255,0.9); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    
    .accordion-button:not(.collapsed) { background-color: #e8f5e9; color: #198754; }
    .sub-group { border-left: 3px solid #198754; background: #fafafa; }
    .btn-check:checked + .btn-outline-success { background-color: #198754; color: white; border-color: #198754; }
    .fake-input-btn { cursor: pointer; text-align: left; }
    
    /* 自訂漸進式展開的過場動畫 */
    .fade-in-section { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-2">
    <div class="container-fluid"><span class="navbar-brand mb-0 h1 fs-5">📦 典藏庫房管理系統</span></div>
  </nav>

  <div id="loadingMask">
    <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
    <h5 class="mt-3 text-success fw-bold" id="loadingText">系統連線中...</h5>
  </div>

  <div class="container px-2">
    <ul class="nav nav-tabs nav-fill mb-2" id="systemTabs">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#inv">文物盤點</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#move">文物異動</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#mgr">管理後台</button></li>
    </ul>

    <div class="tab-content">
      <div class="tab-pane fade show active" id="inv">
        <div id="step1" class="step-card active">
          <div class="alert alert-info py-2 fw-bold" id="baselineInfo" style="font-size: 0.85rem;">載入盤點基準日中...</div>
          <h5 class="mb-3">選擇盤點模式</h5>
          <div class="form-check mb-2"><input class="form-check-input" type="radio" name="mode" id="modeAll" value="all" checked onchange="toggleLocBox()"><label class="form-check-label fw-bold" for="modeAll">全部盤點 (整座庫房)</label></div>
          <div class="form-check mb-4"><input class="form-check-input" type="radio" name="mode" id="modePartial" value="partial" onchange="toggleLocBox()"><label class="form-check-label fw-bold" for="modePartial">部分盤點 (指定地點)</label></div>
          
          <div id="locBox" style="display:none;" class="mb-4 bg-white p-3 border rounded shadow-sm">
            <input type="text" id="invLocSearch" class="form-control mb-3" placeholder="🔍 搜尋區域/櫃位/層位..." onkeyup="filterInvTree()">
            <div id="locCheckboxes">載入地點中...</div>
          </div>
          <button class="btn btn-success w-100 fw-bold fs-5 py-3" onclick="startInventorySession()">🚀 進入掃描畫面</button>
        </div>

        <div id="step2" class="step-card p-2">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="mb-0 fw-bold">團隊同步進度</h6>
            <button class="btn btn-danger btn-sm fw-bold" onclick="pauseInventorySession()">🛑 暫停 / 結算</button>
          </div>
          <div class="row g-2 mb-2">
            <div class="col-4"><div class="stat-box py-1"><div class="stat-num text-primary" id="valTotal" style="font-size: 1.2rem;">...</div><small>總件</small></div></div>
            <div class="col-4"><div class="stat-box py-1"><div class="stat-num text-success" id="valScanned" style="font-size: 1.2rem;">0</div><small>已盤</small></div></div>
            <div class="col-4"><div class="stat-box py-1"><div class="stat-num text-danger" id="valUnscanned" style="font-size: 1.2rem;">...</div><small>未盤</small></div></div>
          </div>
          <div class="progress mb-3" style="height: 12px;"><div id="progressBar" class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width: 0%;"></div></div>
          
          <div id="reader-container">
            <div id="resultOverlay">
              <div class="d-flex align-items-center">
                <img id="resImg" class="result-img" src="" onerror="this.style.display='none'">
                <div class="flex-grow-1">
                  <div id="resStatus" class="fw-bold mb-1" style="font-size: 1.1rem;"></div>
                  <div id="resName" class="text-primary fw-bold" style="font-size: 0.9rem;"></div>
                  <div id="resDesc" class="text-muted" style="font-size: 0.75rem;"></div>
                </div>
              </div>
            </div>
            <div id="reader"></div>
          </div>
        </div>

        <div id="step3" class="step-card">
          <h5 class="mb-4 text-center">✅ 本次盤點進度已暫存</h5>
          <div class="mb-3"><label>接收 Excel 報表的 Email</label><input type="email" id="exportEmail" class="form-control"></div>
          <label>匯出範圍</label>
          <select id="exportType" class="form-select mb-4">
            <option value="all">匯出「全部名單」</option>
            <option value="scanned">僅匯出「已盤點」</option>
            <option value="unscanned">僅匯出「未盤點 (缺漏)」</option>
          </select>
          <button class="btn btn-primary w-100 mb-2 py-2 fw-bold" onclick="exportReport()" id="btnExport">寄送 Email 報表</button>
          <button class="btn btn-outline-secondary w-100 py-2" onclick="location.reload()">返回首頁</button>
        </div>
      </div>

      <div class="tab-pane fade" id="move">
        <div class="step-card active">
          <h5 class="mb-3 text-primary">🚚 搬運人員填報</h5>
          
          <div id="mvPhase1">
            <div class="mb-3"><label class="form-label text-primary fw-bold">1. 選擇異動專案事件</label><select id="mvEvent" class="form-select border-primary" onchange="loadWorkerLocations()"><option value="">請先等待系統載入...</option></select></div>
            <div class="mb-3"><label class="form-label text-primary fw-bold">2. 選擇原典藏地點</label><input type="text" id="mvLocDisplay" class="form-control fake-input-btn border-primary" readonly placeholder="請點此選擇..." onclick="triggerMvLoc()"><input type="hidden" id="mvLoc"></div>
          </div>

          <div id="mvPhase2" style="display:none;" class="fade-in-section mt-4 pt-3 border-top">
            <label class="form-label text-danger fw-bold">3. 選擇搬運文物 (可多選)</label>
            <div class="d-flex justify-content-between mb-2">
              <button type="button" class="btn btn-sm btn-outline-danger" onclick="toggleAllItems(true)">☑️ 全選</button>
              <button type="button" class="btn btn-sm btn-outline-secondary" onclick="toggleAllItems(false)">☐ 清除全選</button>
            </div>
            <div id="mvItemList" class="border rounded p-2 bg-light mb-2" style="max-height: 250px; overflow-y: auto;">
              </div>
          </div>

          <div id="mvPhase3" style="display:none;" class="fade-in-section mt-4 pt-3 border-top">
            <div class="mb-3"><label class="form-label text-success fw-bold">4. 移往暫存地點</label><input type="text" id="mvNewLocDisplay" class="form-control fake-input-btn border-success" readonly placeholder="請點此選擇..." onclick="triggerMvNewLoc()"><input type="hidden" id="mvNewLoc"></div>
            
            <div class="mb-3 form-check"><input type="checkbox" class="form-check-input" id="mvIsBox" onchange="toggleBoxInput()"><label class="form-check-label fw-bold" for="mvIsBox">裝箱</label></div>
            <div class="mb-3 bg-light p-3 border rounded fade-in-section" id="boxInputContainer" style="display:none;">
              <label class="form-label text-dark">📦 輸入箱名</label>
              <input type="text" class="form-control" id="mvBoxName" placeholder="請填寫箱名，例如：BOX-01">
            </div>
            
            <div class="mb-4"><label class="form-label text-dark fw-bold">5. 本處人員</label><select id="mvStaffInternal" class="form-select border-dark"></select></div>
            
            <button class="btn btn-primary w-100 fw-bold fs-5 py-3 shadow-sm" id="btnSubmitMove" onclick="submitMovement()">📤 送出搬運單</button>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="mgr">
        <div id="mgrLogin" class="step-card active">
          <h5 class="mb-3 text-danger">🔒 管理員登入</h5>
          <input type="password" id="mgrPwd" class="form-control mb-3" placeholder="輸入管理員密碼">
          <button class="btn btn-danger w-100 fw-bold py-2" onclick="loginManager()">登入系統</button>
        </div>
        
        <div id="mgrDashboard" class="step-card">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0 text-danger fw-bold">⚙️ 管理面板</h5>
            <button class="btn btn-outline-secondary btn-sm" onclick="location.reload()">登出</button>
          </div>
          
          <div class="card mb-3 border-primary">
            <div class="card-body py-2">
              <h6 class="card-title text-primary small fw-bold">本期盤點基準日設定</h6>
              <div class="input-group input-group-sm">
                <input type="datetime-local" id="newBaseline" class="form-control">
                <button class="btn btn-primary" onclick="updateBaseline()">更新</button>
              </div>
              <small class="text-muted">※ 基準日後的掃描才會計入「已盤點」</small>
            </div>
          </div>

          <div class="mb-3"><label class="form-label small">選擇審核專案</label><select id="mgrEvent" class="form-select" onchange="loadManagerData()"></select></div>
          <ul class="nav nav-pills mb-3" id="mgrPills">
            <li class="nav-item"><button class="nav-link active py-1 px-3" data-bs-toggle="pill" data-bs-target="#mgrPending">待核對</button></li>
            <li class="nav-item"><button class="nav-link py-1 px-3" data-bs-toggle="pill" data-bs-target="#mgrConfirmed">已核對</button></li>
          </ul>
          <div class="tab-content">
            <div class="tab-pane fade show active" id="mgrPending">
              <div class="table-responsive"><table class="table table-bordered table-striped" id="tablePending"><thead><tr><th><input type="checkbox" onchange="toggleAllCheck(this, '.chk-pend')"></th><th>文物</th><th>地點/箱</th><th>操作</th></tr></thead><tbody></tbody></table></div>
              <button class="btn btn-success action-btn fw-bold" onclick="changeStatus('.chk-pend', true)">✅ 批次通過</button>
            </div>
            <div class="tab-pane fade" id="mgrConfirmed">
              <div class="table-responsive"><table class="table table-bordered table-striped" id="tableConfirmed"><thead><tr><th><input type="checkbox" onchange="toggleAllCheck(this, '.chk-conf')"></th><th>文物</th><th>地點/箱</th><th>操作</th></tr></thead><tbody></tbody></table></div>
              <button class="btn btn-warning action-btn fw-bold" onclick="changeStatus('.chk-conf', false)">↩️ 撤銷核對</button>
              <hr>
              <button class="btn btn-dark w-100 fw-bold mt-2" onclick="syncToMaster()">💾 結案：同步至藏品總表</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="locModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable"><div class="modal-content">
      <div class="modal-header bg-light"><h5 class="modal-title fw-bold" id="locModalTitle">選擇地點</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body p-3"><input type="text" id="modalLocSearch" class="form-control mb-3" placeholder="🔍 搜尋..." onkeyup="filterModalTree()"><div id="modalLocContainer"></div></div>
    </div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ==========================================
    // ⚠️ 核心設定：請貼上您最新部署的 GAS API 網址！
    const API_URL = "https://script.google.com/macros/s/AKfycbyqp0mjDTKBN0-qru1ITtgvxXKsFq96V-WmUEzK5ZxcjUyxonLX8Wd9xeXqBmWZ95yS/exec"; 
    // ==========================================

    let currentManager = "", globalLocTree = [], pendingLocTree = [], currentModalTarget = "", baselineTime = 0;

    function showLoading(msg = "系統連線中...") { document.getElementById('loadingText').innerText = msg; document.getElementById('loadingMask').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingMask').style.display = 'none'; }

    async function callAPI(action, payload = {}) {
      try {
        const cacheBuster = "?t=" + new Date().getTime(); 
        const response = await fetch(API_URL + cacheBuster, { 
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: action, payload: payload })
        });
        const res = await response.json();
        if (!res.success) throw new Error(res.error || res.msg);
        return res.data;
      } catch (err) { 
        throw new Error(err.message); 
      }
    }

    window.onload = async function() {
      try {
        const [invData, workData] = await Promise.all([callAPI('getInventoryInitData'), callAPI('getWorkerInitData')]);
        
        baselineTime = invData.baselineTime || 0;
        let d = new Date(baselineTime);
        if (isNaN(d.getTime())) d = new Date();
        document.getElementById('baselineInfo').innerText = `📅 本期盤點基準日：${d.toLocaleString()}`;
        
        renderTreeHTML(invData.locTree || [], 'locCheckboxes', 'inv', true);
        globalLocTree = workData.locTree || [];
        
        // 綁定下拉選單資料
        populateSelect('mvEvent', workData.events || [], true);
        populateSelect('mgrEvent', workData.events || [], true);
        populateSelect('mvStaffInternal', workData.staffInternal || []);
        
      } catch (err) { 
        alert("⚠️ 系統載入異常！\n請確定 GAS 已經成功「發布為新版本」。\n錯誤細節：" + err.message); 
      } finally {
        hideLoading(); 
      }
    };

    function populateSelect(id, arr, isObj = false) { 
        if (!arr || !Array.isArray(arr)) return; 
        document.getElementById(id).innerHTML = '<option value="">請選擇...</option>' + arr.map(x => isObj ? `<option value="${x.id}">${x.name}</option>` : `<option value="${x}">${x}</option>`).join(''); 
    }

    // ==================== 樹狀結構與 UI 邏輯 ====================
    function renderTreeHTML(treeData, containerId, prefix, isMulti) {
      if(!treeData || treeData.length === 0) { document.getElementById(containerId).innerHTML = '<div class="alert alert-warning">無可用地點</div>'; return; }
      let html = `<div class="accordion" id="${prefix}Accordion">`;
      treeData.forEach((mainNode, mIdx) => {
        let totalLeaves = mainNode.subs.reduce((sum, sub) => sum + sub.details.length, 0);
        let badgeHtml = isMulti ? `<span class="badge bg-secondary ms-2 count-badge" data-total="${totalLeaves}">已選 0/${totalLeaves}</span>` : '';
        html += `<div class="accordion-item main-item"><h2 class="accordion-header"><button class="accordion-button collapsed d-flex justify-content-between" type="button" data-bs-toggle="collapse" data-bs-target="#${prefix}Col${mIdx}"><div><strong>${mainNode.main}</strong> ${badgeHtml}</div></button></h2><div id="${prefix}Col${mIdx}" class="accordion-collapse collapse"><div class="accordion-body p-2">`;
        mainNode.subs.forEach((subNode, sIdx) => {
          let collapseId = `${prefix}_m${mIdx}_s${sIdx}_collapse`;
          if (subNode.details.length === 1 && subNode.details[0].label === "(本區)") {
            let det = subNode.details[0];
            html += `<div class="sub-group mb-2"><div class="leaf-item">` + (isMulti ? `<input type="checkbox" class="btn-check leaf-cb" value="${det.val}" id="${prefix}_m${mIdx}_s${sIdx}_d0" onchange="updateCounts()"><label class="btn btn-outline-success w-100 text-start fw-bold py-2" for="${prefix}_m${mIdx}_s${sIdx}_d0">📁 ${subNode.sub}</label>` : `<button type="button" class="btn btn-outline-dark w-100 text-start fw-bold py-2" onclick="selectModalLoc('${det.val}')">📁 ${subNode.sub}</button>`) + `</div></div>`;
          } else {
            html += `<div class="sub-group mb-3 border rounded p-2 bg-light"><div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-2"><div class="fw-bold text-primary flex-grow-1" style="cursor:pointer;" data-bs-toggle="collapse" data-bs-target="#${collapseId}">📂 ${subNode.sub}</div>` + (isMulti ? `<div class="btn-group"><button type="button" class="btn btn-sm btn-outline-primary" onclick="selectAllInSub(this, true, '${collapseId}')">全選</button><button type="button" class="btn btn-sm btn-outline-secondary" onclick="selectAllInSub(this, false)">清除</button></div>` : '') + `</div><div id="${collapseId}" class="collapse"><div class="row g-2 pt-1">`;
            subNode.details.forEach((det, dIdx) => {
              html += `<div class="col-6 col-md-4 leaf-item">` + (isMulti ? `<input type="checkbox" class="btn-check leaf-cb" value="${det.val}" id="${prefix}_m${mIdx}_s${sIdx}_d${dIdx}" onchange="updateCounts()"><label class="btn btn-outline-success w-100 text-center py-2" for="${prefix}_m${mIdx}_s${sIdx}_d${dIdx}">${det.label}</label>` : `<button type="button" class="btn btn-outline-dark w-100 text-center py-2" onclick="selectModalLoc('${det.val}')">${det.label}</button>`) + `</div>`;
            });
            html += `</div></div></div>`;
          }
        });
        html += `</div></div></div>`;
      });
      document.getElementById(containerId).innerHTML = html + '</div>';
    }

    function selectAllInSub(btn, isSelect, collapseId) {
      btn.closest('.sub-group').querySelectorAll('.leaf-cb').forEach(cb => { if (cb.closest('.leaf-item').style.display !== 'none') cb.checked = isSelect; });
      if(isSelect && collapseId) { const div = document.getElementById(collapseId); if(div) div.classList.add('show'); }
      updateCounts();
    }
    
    function updateCounts() {
      document.querySelectorAll('.main-item').forEach(main => {
        const checked = Array.from(main.querySelectorAll('.leaf-cb')).filter(cb => cb.checked).length;
        const badge = main.querySelector('.count-badge'); if(!badge) return;
        badge.innerText = `已選 ${checked}/${badge.getAttribute('data-total')}`;
        badge.className = checked > 0 ? 'badge bg-success ms-2 count-badge' : 'badge bg-secondary ms-2 count-badge';
      });
    }

    function filterInvTree() { execFilter('invLocSearch', 'locCheckboxes'); }
    function filterModalTree() { execFilter('modalLocSearch', 'modalLocContainer'); }
    function execFilter(id, container) {
      const term = document.getElementById(id).value.toLowerCase();
      document.querySelectorAll(`#${container} .main-item`).forEach(main => {
        let mVis = false;
        main.querySelectorAll('.sub-group').forEach(sub => {
          let sVis = false;
          sub.querySelectorAll('.leaf-item').forEach(leaf => {
            const txt = leaf.innerText.toLowerCase();
            if (txt.includes(term)) { leaf.style.display = ''; sVis = true; mVis = true; } else { leaf.style.display = 'none'; }
          });
          sub.style.display = sVis ? '' : 'none';
          const coll = sub.querySelector('.collapse'); if(coll && term && sVis) coll.classList.add('show');
        });
        const mColl = main.querySelector('.accordion-collapse'); if(mColl && term && mVis) mColl.classList.add('show');
        main.style.display = mVis ? '' : 'none';
      });
    }

    // ==================== 1. 盤點 API ====================
    let scanner, lastScan = 0, sysState = { mode: 'all', locations: [], total: 0, scanned: 0 }, isProc = false;

    function toggleLocBox() { document.getElementById('locBox').style.display = document.getElementById('modePartial').checked ? 'block' : 'none'; }

    async function startInventorySession() {
      sysState.mode = document.getElementById('modeAll').checked ? 'all' : 'partial';
      sysState.locations = Array.from(document.querySelectorAll('.leaf-cb:checked')).map(cb => cb.value);
      if(sysState.mode === 'partial' && sysState.locations.length === 0) return alert('請先選擇地點！');
      
      showLoading('同步全域進度...');
      try {
        const res = await callAPI('startInventory', sysState);
        sysState.total = res.total; sysState.scanned = res.scanned; updateProgressUI();
        
        document.getElementById('step1').style.display = 'none'; document.getElementById('step2').style.display = 'block';
        hideLoading();

        scanner = new Html5Qrcode("reader");
        const config = { 
          fps: 20, 
          qrbox: { width: 250, height: 250 },
          aspectRatio: 1.0,
          videoConstraints: {
            facingMode: "environment",
            width: { min: 640, ideal: 1280, max: 1920 },
            height: { min: 480, ideal: 720, max: 1080 },
            advanced: [{ focusMode: "continuous" }]
          }
        };
        scanner.start({ facingMode: "environment" }, config, msg => submitScan(msg));
      } catch (e) {
        hideLoading();
        alert("錯誤：" + e.message);
      }
    }

    function updateProgressUI() {
      document.getElementById('valTotal').innerText = sysState.total;
      document.getElementById('valScanned').innerText = sysState.scanned;
      document.getElementById('valUnscanned').innerText = Math.max(0, sysState.total - sysState.scanned);
      const pct = sysState.total === 0 ? 0 : Math.round((sysState.scanned / sysState.total) * 100);
      document.getElementById('progressBar').style.width = pct + '%';
    }

    async function submitScan(msg) {
      if (isProc || Date.now() - lastScan < 1500) return;
      isProc = true; lastScan = Date.now();
      
      const overlay = document.getElementById('resultOverlay');
      overlay.style.display = 'block'; overlay.style.borderColor = '#ffc107';
      document.getElementById('resStatus').innerText = '⏳ 雲端同步中...';
      
      try {
        const res = await callAPI('submitScan', { qrStr: msg, mode: sysState.mode, locations: sysState.locations });
        playSound('success');
        sysState.scanned = res.globalScanned; updateProgressUI();
        overlay.style.borderColor = '#198754';
        document.getElementById('resStatus').innerHTML = '<span class="text-success">✅ 盤點成功</span>';
        document.getElementById('resName').innerText = res.name;
        document.getElementById('resDesc').innerText = res.desc || "";
        
        if(res.img) { 
          document.getElementById('resImg').src = res.img; 
          document.getElementById('resImg').style.display = 'block'; 
        } else {
          document.getElementById('resImg').src = ''; 
          document.getElementById('resImg').style.display = 'none'; 
        }
      } catch (e) {
        playSound('error');
        overlay.style.borderColor = '#dc3545';
        document.getElementById('resStatus').innerHTML = '<span class="text-danger">❌ 錯誤</span>';
        document.getElementById('resName').innerText = msg;
        document.getElementById('resDesc').innerText = e.message;
      }
      setTimeout(() => { overlay.style.display = 'none'; isProc = false; }, 3000);
    }

    function pauseInventorySession() {
      if(!confirm("確定要暫停目前的盤點作業嗎？\n(進度已自動儲存至雲端，隨時可接續盤點)")) return;
      if (scanner) scanner.stop().then(() => scanner.clear());
      document.getElementById('step2').style.display = 'none'; document.getElementById('step3').style.display = 'block';
    }

    let audioCtx;
    function playSound(k) { 
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const o = audioCtx.createOscillator(); 
      const g = audioCtx.createGain(); 
      o.type = k === 'success' ? 'triangle' : 'square'; 
      o.frequency.value = k === 'success' ? 1100 : 550; 
      o.connect(g); 
      g.connect(audioCtx.destination); 
      g.gain.setValueAtTime(0.05, audioCtx.currentTime); 
      o.start(); 
      setTimeout(() => { o.stop(); }, 150); 
    }

    // ==================== 2. 搬運 API (優化流暢度與批次) ====================
    async function loadWorkerLocations() {
      const eid = document.getElementById('mvEvent').value; const d = document.getElementById('mvLocDisplay');
      document.getElementById('mvLoc').value = ""; d.value = ""; 
      
      // 隱藏下方階段
      document.getElementById('mvPhase2').style.display = 'none';
      document.getElementById('mvPhase3').style.display = 'none';
      
      if(!eid) return;
      showLoading('分析地點中...');
      try { 
        const res = await callAPI('getPendingLocations', { eventId: eid }); 
        pendingLocTree = res.locTree || []; d.placeholder = "請選擇..."; 
      } catch (e) { 
        alert("載入失敗：" + e.message); 
      } finally {
        hideLoading();
      }
    }
    
    function triggerMvLoc() { 
      if(!document.getElementById('mvEvent').value) return alert('請先選擇事件！');
      currentModalTarget='mvLoc'; document.getElementById('locModalTitle').innerText = "選擇「原典藏地點」";
      renderTreeHTML(pendingLocTree,'modalLocContainer','modal',false); 
      bootstrap.Modal.getOrCreateInstance(document.getElementById('locModal')).show(); 
    }
    
    function triggerMvNewLoc() { 
      currentModalTarget='mvNewLoc'; document.getElementById('locModalTitle').innerText = "選擇「暫存地點」";
      renderTreeHTML(globalLocTree,'modalLocContainer','modal',false); 
      bootstrap.Modal.getOrCreateInstance(document.getElementById('locModal')).show(); 
    }
    
    function selectModalLoc(v) { 
      document.getElementById(currentModalTarget).value=v; document.getElementById(currentModalTarget+'Display').value=v; 
      bootstrap.Modal.getInstance(document.getElementById('locModal')).hide(); 
      if(currentModalTarget==='mvLoc') loadWorkerItems(); // 選擇舊地點後自動載入文物
    }

    // 展開第二階段：載入文物核取方塊
    async function loadWorkerItems() {
      const eid = document.getElementById('mvEvent').value, loc = document.getElementById('mvLoc').value;
      if (!eid || !loc) return;
      showLoading('載入文物清單中...');
      try {
        const res = await callAPI('getPendingItems', { eventId: eid, location: loc });
        const listDiv = document.getElementById('mvItemList');
        
        if (res.length === 0) {
          listDiv.innerHTML = '<div class="text-muted text-center py-4">此地點所有文物皆已搬運完畢！</div>';
          document.getElementById('mvPhase3').style.display = 'none'; // 隱藏提交區
        } else {
          listDiv.innerHTML = res.map((x, i) => `
            <div class="form-check mb-2 pb-2 border-bottom">
              <input class="form-check-input mv-item-cb" type="checkbox" value="${x.rowIndex}" id="mvItem_${i}" onchange="checkPhase3Trigger()">
              <label class="form-check-label w-100 fs-6" for="mvItem_${i}">${x.qrCode.split('\n')[0]}</label>
            </div>
          `).join('');
          checkPhase3Trigger(); // 初始化檢查
        }
        document.getElementById('mvPhase2').style.display = 'block'; // 顯示文物區塊
      } catch (e) {
        alert("清單讀取失敗：" + e.message);
      } finally {
        hideLoading();
      }
    }

    // 全選/清除按鈕邏輯
    function toggleAllItems(state) {
      document.querySelectorAll('.mv-item-cb').forEach(cb => cb.checked = state);
      checkPhase3Trigger();
    }

    // 判斷是否顯示第三階段 (必須至少勾選一件文物)
    function checkPhase3Trigger() {
      const checkedCount = document.querySelectorAll('.mv-item-cb:checked').length;
      if (checkedCount > 0) {
        document.getElementById('mvPhase3').style.display = 'block';
      } else {
        document.getElementById('mvPhase3').style.display = 'none';
      }
    }

    // 條件式顯示箱名並自動清空
    function toggleBoxInput() {
      const isBox = document.getElementById('mvIsBox').checked;
      const boxContainer = document.getElementById('boxInputContainer');
      const boxInput = document.getElementById('mvBoxName');
      
      if (isBox) {
        boxContainer.style.display = 'block';
      } else {
        boxContainer.style.display = 'none';
        boxInput.value = ''; // 自動清空，避免幽靈資料
      }
    }

    // 批次送出與無縫接軌重置機制
    async function submitMovement() {
      const selectedItems = Array.from(document.querySelectorAll('.mv-item-cb:checked')).map(cb => parseInt(cb.value));
      const newLoc = document.getElementById('mvNewLoc').value;
      const staffInt = document.getElementById('mvStaffInternal').value;
      
      if(selectedItems.length === 0 || !newLoc || !staffInt) return alert('請確認「已勾選文物」、「暫存地點」與「本處人員」皆已完整填寫！');
      
      showLoading(`正在寫入 ${selectedItems.length} 件異動紀錄...`);
      const payload = { 
        rowIndices: selectedItems, // 傳送陣列
        newLoc: newLoc, 
        isBox: document.getElementById('mvIsBox').checked ? 'TRUE' : 'FALSE', 
        boxName: document.getElementById('mvBoxName').value, 
        staffInternal: staffInt 
      };
      
      try {
        await callAPI('submitMovement', payload); 
        alert(`✅ 成功送出 ${selectedItems.length} 件文物搬運紀錄！`); 
        
        // --- 執行局部清空 (無縫接軌) ---
        // 1. 清空新地點
        document.getElementById('mvNewLoc').value = "";
        document.getElementById('mvNewLocDisplay').value = "";
        
        // 2. 復原箱名設定
        document.getElementById('mvIsBox').checked = false;
        toggleBoxInput(); // 隱藏並清空輸入框
        
        // 3. 隱藏第三階段 (因為新地點空了)
        document.getElementById('mvPhase3').style.display = 'none';
        
        // 4. 重新載入該地點文物 (會自動剔除剛剛搬走的，更新清單)
        loadWorkerItems(); 
        
      } catch(e) {
        alert("送出失敗：" + e.message);
      } finally {
        hideLoading();
      }
    }

    // ==================== 3. 管理後台 ====================
    async function loginManager() {
      const pwd = document.getElementById('mgrPwd').value;
      if(!pwd) return alert("請輸入密碼！");
      showLoading('登入驗證中...');
      try {
        const res = await callAPI('verifyManager', { pwd: pwd });
        currentManager = res.managerName; 
        document.getElementById('mgrLogin').style.display='none'; 
        document.getElementById('mgrDashboard').style.display='block';
      } catch(e) {
        alert("登入失敗：" + e.message);
      } finally {
        hideLoading();
      }
    }
    
    async function updateBaseline() {
      const timeVal = document.getElementById('newBaseline').value; 
      if(!timeVal) return alert('請選擇日期時間');
      if(!confirm("確定要更新基準日嗎？這會影響全團隊的已盤點計數。")) return;
      showLoading('更新基準日中...'); 
      try {
        await callAPI('updateBaseline', { timeString: timeVal }); 
        alert('✅ 基準日更新成功！');
        location.reload();
      } catch (e) {
        alert("更新失敗：" + e.message);
        hideLoading();
      }
    }
    
    async function loadManagerData() {
      showLoading('載入表單中...');
      try {
        const res = await callAPI('getManagerData', { eventId: document.getElementById('mgrEvent').value });
        renderTable('tablePending', res.pending, 'chk-pend', true); 
        renderTable('tableConfirmed', res.confirmed, 'chk-conf', false);
      } catch(e) {
        alert("載入失敗：" + e.message);
      } finally {
        hideLoading();
      }
    }
    
    function renderTable(tid, data, cls, edit) {
      document.querySelector(`#${tid} tbody`).innerHTML = data.map(x => `<tr><td><input type="checkbox" class="${cls}" value="${x.rowIndex}"></td><td><b>${x.qrCode.split('\n')[0]}</b><br><small>${x.oldLoc}</small></td><td>${x.newLoc}<br><small>${x.boxName||''}</small></td><td>${edit?`<button class="btn btn-sm btn-outline-primary" onclick="promptEdit(${x.rowIndex},'${x.newLoc}','${x.boxName}')">📝</button>`:`<small>${x.manager}</small>`}</td></tr>`).join('');
    }
    
    async function changeStatus(cls, stat) {
      const rows = Array.from(document.querySelectorAll(`${cls}:checked`)).map(cb => parseInt(cb.value));
      if(rows.length === 0) return alert('請先勾選項目！');
      showLoading('處理中...');
      try {
        await callAPI('toggleStatus', { rowIndices: rows, newStatus: stat, managerName: currentManager }); 
        loadManagerData();
      } catch(e) {
        alert("更新狀態失敗：" + e.message);
        hideLoading();
      }
    }
    
    async function promptEdit(ri, nl, nb) {
      const loc = prompt("修改暫存地點：", nl); const box = prompt("修改箱名：", nb);
      if(loc!==null) { 
        showLoading('更新中...');
        try {
          await callAPI('editItem', { rowIndex: ri, newLoc: loc, boxName: box, managerName: currentManager }); 
          loadManagerData(); 
        } catch(e) {
          alert("修改失敗：" + e.message);
          hideLoading();
        }
      }
    }
    
    async function syncToMaster() {
      if(!confirm("確定要結案同步嗎？")) return;
      showLoading('寫入總表中，請勿關閉視窗...'); 
      try {
        await callAPI('syncToMaster', { eventId: document.getElementById('mgrEvent').value }); 
        alert('✅ 結案成功！'); 
        loadManagerData(); 
      } catch(e) {
        alert("同步失敗：" + e.message);
        hideLoading();
      }
    }
    
    function toggleAllCheck(s, t) { document.querySelectorAll(t).forEach(cb => cb.checked = s.checked); }
    
    function exportReport() { 
      const emailInput = document.getElementById('exportEmail').value;
      if (!emailInput) {
        return alert('請先填寫「接收 Excel 報表的 Email」！');
      }
      showLoading('報表寄送中...');
      callAPI('exportInventoryReport', { email: emailInput, reportType: document.getElementById('exportType').value, mode: sysState.mode, locations: sysState.locations })
      .then(()=> { alert('報表已寄出！'); hideLoading(); })
      .catch(e => { alert("寄送失敗：" + e.message); hideLoading(); }); 
    }
  </script>
