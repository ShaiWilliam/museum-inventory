<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>文物盤點、查詢及異動系統</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root{ --radius:14px; --muted:#f6f7f8; --border:#e6e8eb; --text:#222; --accent:#2563eb; --accent-weak:#e7f0ff; --danger:#d93025; --success:#137333; --mask-bg: rgba(0,0,0,.28);
      --scale: 1;
      --fs-base: clamp(16px, 3.4vw, 18px);
      --fs-title: clamp(18px, 4.4vw, 22px);
      --fs-chip: clamp(13px, 3.2vw, 15px);
      --pad-card: calc(12px * var(--scale));
      --pad-btn: calc(12px * var(--scale));
      --hit-min: 44px;
    }
    @media (max-width: 480px){ :root{ --scale: 1.15; } }
    html { -webkit-text-size-adjust: 100%; }
    body { font-family: system-ui, -apple-system, sans-serif; padding:16px; max-width:1000px; margin:auto; color:var(--text); font-size: var(--fs-base); }
    h2 { margin: 8px 0 16px; font-weight: bold; }
    button { cursor: pointer; min-height: var(--hit-min); padding: var(--pad-btn); }
    .card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:var(--pad-card); margin-bottom: 15px;}
    .stack { display:grid; gap:12px; }
    .row { display:flex; gap:clamp(8px, 2.5vw, 12px); align-items:center; flex-wrap:wrap; }
    .row-right { margin-left:auto; display:flex; gap:8px; }
    .muted { color:#666; } .error { color:var(--danger); font-weight:600; } .success { color:var(--success); font-weight:600; }
    img { max-width:100%; border-radius:8px; }
    #reader { width:100%; margin-top:12px; border-radius: 10px; overflow: hidden; }

    /* 四合一頁籤 */
    .tabs { display:flex; background:var(--muted); border:1px solid var(--border); border-radius:999px; padding:4px; margin-bottom:16px; overflow-x: auto; white-space: nowrap;}
    .tabs::-webkit-scrollbar { display: none; }
    .tabs .tab { flex:1; border:0; background:transparent; padding:10px 12px; border-radius:999px; font-size:15px; font-weight:bold; color:#555;}
    .tabs .tab.active { background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.06); color:var(--accent); }
    .tabs.small .tab{ padding:8px 10px; font-size:14px; min-height:36px; }

    .segmented { display:flex; background:var(--muted); border:1px solid var(--border); border-radius:999px; padding:4px; }
    .segmented .seg { border:0; background:transparent; padding:10px 12px; border-radius:999px; font-size:15px; }
    .segmented .seg.active { background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.06); font-weight:bold;}

    #progressContainer { background:var(--muted); border-radius:var(--radius); padding:12px; }
    .bar-bg { background: #ddd; height: 24px; border-radius: 12px; overflow: hidden; }
    .bar-fill { background: #4caf50; height: 100%; width: 0%; text-align: center; color: white; line-height: 24px; font-size: 14px; transition: width .35s; font-weight:bold;}

    details.zone, details.subgroup { border:1px solid var(--border); border-radius:var(--radius); background:#fff; overflow:hidden; }
    details.zone + details.zone { margin-top:8px; }
    summary { list-style:none; cursor:pointer; padding:12px 14px; display:flex; align-items:center; gap:8px; }
    summary::-webkit-details-marker { display:none; }
    .z-title, .g-title { font-weight:600; }
    .sm-right { margin-left:auto; display:flex; gap:8px; align-items:center; color:#555; font-size:13px; }
    .chips-inline { display:flex; gap:6px; overflow:auto; max-width:60%; }
    .chip { background:#f0f1f2; padding: 6px 10px; border-radius:999px; font-size:var(--fs-chip); line-height:1; white-space:nowrap; display:inline-flex; align-items:center; gap:6px; }
    .chip .x{ border:0; background:transparent; cursor:pointer; padding:0 4px; font-size:14px; line-height:1; color:#555; }

    .search { display:flex; gap:8px; align-items:center; padding: 0 0 10px; }
    .toolbar { display:flex; gap:8px; padding:0 0 8px; flex-wrap:wrap; }
    .toolbar button { padding:9px; border:1px solid var(--border); background:#fff; border-radius:10px; font-size:14px; }

    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(118px, 1fr)); gap:8px; padding: 0 14px 10px; }
    .tag { background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center; user-select:none; transition:transform .05s ease, background .15s ease, border-color .15s ease; }
    .tag:active { transform:scale(0.98); }
    .tag.selected { background:var(--accent-weak); border-color:#6aa6ff; font-weight:bold;}

    .subgroup.single summary.selected { background: var(--accent-weak); }
    .mini-row { display:flex; align-items:center; gap:8px; padding:6px 0; }
    .mini-title { flex: 0 1 auto; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mini-bar { flex:1; height:6px; background:#eee; border-radius:999px; overflow:hidden; }
    .mini-bar > span { display:block; height:100%; background:#4caf50; width:0; }
    .mini-num { width:auto; font-size:12px; color:#555; white-space:nowrap; }

    .btn { padding:10px 12px; border:1px solid var(--border); border-radius:12px; background:#fff; font-weight:500;}
    .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn.block { width:100%; font-size:1.1rem; }
    .btn.small { min-height:34px; padding:8px 10px; font-size:13px; border-radius:10px; }

    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

    .result-grid { display:grid; grid-template-columns: 1fr; gap: clamp(10px, 2.8vw, 16px); }
    .result-grid.cols-1 { grid-template-columns: 1fr !important; }
    .result-grid.cols-2 { grid-template-columns: repeat(2, minmax(0,1fr)) !important; }
    .result-grid.cols-3 { grid-template-columns: repeat(3, minmax(0,1fr)) !important; }

    .art-card { display:grid; grid-template-rows: auto 1fr; gap:8px; }
    .art-img { width:100%; aspect-ratio: 3 / 2; object-fit:cover; background:#f3f4f6; border-radius:10px; }
    .title{ font-size: var(--fs-title); font-weight: 700; line-height: 1.25; margin: 4px 0 6px; }
    .kv { font-size:13px; color:#444; line-height:1.55; } .kv b { color:#111; }

    .desc { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .desc.expanded{ -webkit-line-clamp: unset; }

    .result-grid.dense .kv-attr, .result-grid.dense .kv-size, .result-grid.dense .kv-level, .result-grid.dense .kv-rect, .result-grid.dense .kv-desc, .result-grid.dense .tags-row, .result-grid.dense .kv-note { display:none; }
    .result-grid.dense .art-img{ aspect-ratio: 4 / 3; }
    .result-grid.dense .title{ font-size: clamp(16px, 4vw, 18px); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .mask { position:fixed; inset:0; background:var(--mask-bg); display:flex; align-items:center; justify-content:center; z-index:9999; height: var(--vvh, 100vh); }
    .mask[hidden]{ display:none; }
    .mask-box { background:#fff; border-radius:16px; padding:14px 20px; box-shadow:0 8px 24px rgba(0,0,0,.18); display:flex; gap:12px; align-items:center; font-weight:bold;}
    .spinner { width:22px; height:22px; border-radius:50%; border:3px solid #ccc; border-top-color:#4caf50; animation:spin .8s linear infinite; }

    .pill { padding:6px 12px; border-radius:999px; border:1px solid var(--border); background:#fff; font-size:13px; font-weight:500;}
    .pill.active { background:var(--accent-weak); border-color:#6aa6ff; color:var(--accent); font-weight:bold;}

    .ce-input{ flex:1; min-height: var(--hit-min); padding: 10px 12px; border:1px solid var(--border); border-radius:10px; font-size: 17px; line-height: 1.4; outline: none; background:#fff; user-select:text; }
    .ce-input:empty::before{ content: attr(data-placeholder); color:#9aa0a6; pointer-events:none; }
    .ce-input.single-line{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    table.table{ width:100%; border-collapse: collapse; }
    .table th,.table td{ border-bottom:1px solid #eee; padding:10px 8px; text-align:left; font-size:14px; }
    select, input[type=text], input[type=password]{ font-size:16px; padding:10px 12px; border:1px solid var(--border); border-radius:10px; width:100%; box-sizing: border-box;}
    label > input[type=checkbox]{ transform: translateY(1px); width:16px; height:16px;}

    .popover { position:absolute; z-index:10000; background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.12); padding:6px; max-height:240px; overflow:auto; min-width:220px; }
    .popover .opt { padding:10px; border-radius:8px; cursor:pointer; font-size:15px;}
    .popover .opt:hover { background:var(--accent-weak); color:var(--accent); font-weight:bold;}
    .field-inline { display:flex; gap:6px; align-items:center; }
    .field-inline input[type=text]{ flex:1; }

    .chips-input{ flex:1; min-height: var(--hit-min); padding: 6px 8px; border:1px solid var(--border); border-radius:10px; background:#fff; display:flex; flex-wrap:wrap; align-items:center; gap:6px; }
    .chips-input input{ border:0; outline:none; padding:6px; font-size:16px; min-width:120px; flex:1; }
  </style>
</head>
<body>
  <h2>📦 典藏庫房管理系統</h2>

  <div class="tabs" role="tablist" aria-label="主功能">
    <button type="button" class="tab active" data-tab="inv">文物盤點</button>
    <button type="button" class="tab" data-tab="search">查詢系統</button>
    <button type="button" class="tab" data-tab="move">文物異動(搬運)</button>
    <button type="button" class="tab" data-tab="admin">管理後台</button>
  </div>

  <div id="invRoot" class="stack">
    <div class="card" id="mainPanel">
      <div class="muted" style="margin-bottom:8px;">盤點模式</div>
      <div class="segmented" role="tablist" aria-label="盤點模式">
        <button type="button" class="seg active" data-value="all" aria-selected="true">全部盤點</button>
        <button type="button" class="seg" data-value="partial" aria-selected="false">部分盤點</button>
      </div>
      <input type="hidden" id="mode" value="all">

      <div id="zonePanel" style="margin-top:16px; display:none;">
        <div class="row" style="margin-bottom:8px;">
          <div class="muted">選擇典藏地點（可複選）</div>
          <div class="row-right"><button type="button" class="btn small" onclick="savePreset()">儲存組合</button></div>
        </div>
        <div class="search"><div id="locationSearchCE" class="ce-input single-line" role="textbox" contenteditable="true" data-placeholder="搜尋區域/層位（例：東側小庫房）"></div></div>
        <div class="toolbar">
          <button type="button" onclick="selectAllVisible()">全選</button>
          <button type="button" onclick="invertVisible()">反選</button>
          <button type="button" onclick="clearAll()">清除</button>
        </div>
        <div id="presetRow" class="row" style="gap:6px; flex-wrap:wrap; margin-bottom:8px;"></div>
        <div id="zoneList"></div>
      </div>

      <div style="margin-top:20px;"><button class="btn primary block" onclick="startInventory()">🚀 開始盤點</button></div>
    </div>

    <div id="scanPanel" class="stack" style="display:none;">
      <div class="row"><button class="btn" onclick="returnToMain()">🔙 暫停 / 返回</button></div>
      <div id="reader" class="card shadow-sm border-0"></div>

      <div id="progressContainer" class="card">
        <strong style="font-size:1.1rem; color:#198754;">📊 盤點進度</strong>
        <div class="bar-bg" style="margin-top:10px;"><div class="bar-fill" id="progressBar">0%</div></div>
        <div id="progressText" class="muted" style="margin-top:8px; font-weight:500;"></div>
        <div id="remainingBreakdown" style="margin-top:12px;"></div>
      </div>

      <div class="two-col">
        <button class="btn" onclick="showUncounted()">📋 尚未盤點清單</button>
        <button class="btn" onclick="exportReport()">📤 匯出全部報表</button>
      </div>
      <div class="two-col">
        <button class="btn" onclick="exportReportFiltered()">📤 匯出目前範圍</button>
        <button class="btn" onclick="exportUncountedFiltered()">📤 匯出未盤點(目前範圍)</button>
      </div>

      <div id="uncountedList" class="card" style="border-color:#ffc107;"></div>
      <div class="card" id="info" style="display:none;"></div>
    </div>
  </div>

  <div id="searchRoot" class="stack" style="display:none;">
    <div class="card">
      <div class="search">
        <div id="qCE" class="ce-input single-line" role="textbox" contenteditable="true" data-placeholder="輸入關鍵字（名稱／標籤／編號）"></div>
        <button class="btn primary" id="btnSearch" onclick="runSearch(true)">搜尋</button>
      </div>

      <div class="toolbar">
        <button class="pill" data-qk="uncounted" onclick="toggleQuick(this)">未盤點</button>
        <button class="pill" data-qk="counted" onclick="toggleQuick(this)">已盤點</button>
        <button class="pill" data-qk="img" onclick="toggleQuick(this)">有圖片</button>
        <button class="pill" data-qk="noimg" onclick="toggleQuick(this)">無圖片</button>

        <span class="row-right" style="gap:8px; align-items:center;">
          <span class="muted" style="font-size:14px;">排序</span>
          <select id="sort" onchange="runSearch()" style="width:auto; padding:6px; font-size:14px;">
            <option value="time_desc">最近盤點 ⬇️</option>
            <option value="time_asc">最近盤點 ⬆️</option>
            <option value="name_asc">名稱 ⬆️</option>
            <option value="name_desc">名稱 ⬇️</option>
          </select>
        </span>
      </div>
    </div>

    <div id="searchResultCard" class="card">
      <div class="row" style="margin-bottom:12px;">
        <div class="row" style="gap:10px; align-items:center;">
          <div><b id="resultCount" style="color:var(--accent); font-size:1.1rem;">0</b> 筆結果</div>
          <div class="row" style="gap:8px; align-items:center;">
            <div class="segmented view-toggle" role="group" aria-label="結果視圖">
              <button class="seg" data-cols="1" data-dense="0" title="1×1 大卡">1×1</button>
              <button class="seg" data-cols="2" data-dense="0" title="2×1 兩欄">2×1</button>
              <button class="seg" data-cols="3" data-dense="0" title="3×1 三欄">3×1</button>
              <button class="seg" data-cols="3" data-dense="1" title="3×2 小卡（精簡）">3×2</button>
            </div>
          </div>
        </div>

        <div class="row-right" style="gap:8px;">
          <label style="font-size:13px; color:#555;">每頁</label>
          <select id="pageSize" onchange="runSearch(true)" style="width:auto; padding:4px 8px; font-size:13px;">
            <option>20</option><option>40</option><option>60</option><option>100</option>
          </select>
          <button class="btn small" onclick="prevPage()">⬅️ 上一頁</button>
          <span class="muted" id="pageInfo" style="font-size:13px;">第 1 / 1 頁</span>
          <button class="btn small" onclick="nextPage()">下一頁 ➡️</button>
        </div>
      </div>
      <div id="results" class="result-grid cols-1"></div>
    </div>
  </div>

  <div id="moveRoot" class="stack" style="display:none;">
    <div id="move-mover" class="card">
      <h3 style="color:var(--accent); margin-top:0;">🚚 搬運人員填報</h3>
      <div class="stack" style="gap:16px;">
        <label>選擇專案事件：<select id="mvEvent" onchange="onMoverEventChange()"></select></label>
        
        <label class="field-inline" style="display:flex; flex-direction:column; align-items:flex-start;">
          <span style="margin-bottom:4px;">操作人（搬運公司，可多位）：</span>
          <div style="display:flex; width:100%; gap:8px;">
            <div class="chips-input" id="mvOpsChips"><input type="text" id="mvOperator" placeholder="輸入姓名後按 Enter"></div>
            <button class="btn" type="button" onclick="openPickListMulti(this,'操作人','mvOpsChips')">▼</button>
          </div>
        </label>

        <label class="field-inline" style="display:flex; flex-direction:column; align-items:flex-start;">
          <span style="margin-bottom:4px;">本處/館方人員（可多位）：</span>
          <div style="display:flex; width:100%; gap:8px;">
            <div class="chips-input" id="mvStaffChips"><input type="text" id="mvStaff" placeholder="輸入姓名後按 Enter"></div>
            <button class="btn" type="button" onclick="openPickListMulti(this,'本處人員','mvStaffChips')">▼</button>
          </div>
        </label>

        <div class="row">
          <span class="muted" id="mvLocPicked" style="font-weight:bold; color:#d93025;">已選 0 個地點</span>
          <button class="btn primary row-right" onclick="moveLoadItems()">📥 載入待搬運清單</button>
        </div>
      </div>

      <div id="mvStep1" class="stack" style="margin-top:20px;">
        <div id="mvZonePanel" style="display:none; background:#f8f9fa; padding:12px; border-radius:10px; border:1px solid #ddd;">
          <div class="muted mb-2">請從此事件中勾選地點</div>
          <div class="search"><div id="mvLocationSearchCE" class="ce-input single-line" role="textbox" contenteditable="true" data-placeholder="可搜地點或編號"></div></div>
          <div class="toolbar">
            <button class="btn small" onclick="mvSelectAllVisible()">全選</button>
            <button class="btn small" onclick="mvInvertVisible()">反選</button>
            <button class="btn small" onclick="mvClearAll()">清除</button>
          </div>
          <div id="mvZoneList"></div>
        </div>
      </div>

      <div id="mvStep2" class="stack" style="display:none; margin-top:15px; border-top:2px dashed #eee; padding-top:15px;">
        <div class="row">
          <button class="btn small" onclick="mvGoStep(1)">🔙 返回重選地點</button>
          <span class="muted row-right" id="mvPicked" style="font-weight:bold; color:var(--success);">已選 0 件</span>
        </div>
        <div class="toolbar" style="background:#e7f0ff; padding:8px; border-radius:8px;">
          <button class="btn small" onclick="moveSelectAll(true)">全選文物</button>
          <button class="btn small" onclick="moveSelectAll(false)">全不選</button>
        </div>
        <div id="mvItemsList" class="stack" style="max-height:340px; overflow:auto; border:1px solid #eee; padding:10px; border-radius:8px;"></div>

        <div class="stack" style="margin-top:10px; background:#fff3cd; padding:15px; border-radius:10px;">
          <label style="font-weight:bold;">移往新地點 (暫存地點)：</label>
          <div class="field-inline">
            <input type="text" id="mvTempLoc" placeholder="例如：臨時庫-1區">
            <button class="btn" type="button" onclick="openPickList(this,'暫存地點','mvTempLoc')">▼</button>
          </div>

          <label style="margin-top:10px;"><input type="checkbox" id="mvBoxed" onchange="document.getElementById('mvBoxNameWrap').style.display=this.checked?'':'none'"> 是否裝箱</label>
          <label id="mvBoxNameWrap" style="display:none; margin-top:5px;">箱子名稱：<input type="text" id="mvBoxName" placeholder="例如：A-1箱"></label>
          
          <button class="btn block" style="background:#d93025; color:#fff; border:none; margin-top:15px;" onclick="moveSubmit()">📤 送出搬運單</button>
        </div>
        <div id="mvMsg" class="muted" style="text-align:center; font-weight:bold;"></div>
      </div>
    </div>
  </div>

  <div id="adminRoot" class="stack" style="display:none;">
    <div id="move-admin-login" class="card active">
      <h3 style="color:var(--danger); margin-top:0;">🔒 管理員登入</h3>
      <div class="stack">
        <label>請輸入密碼：<input type="password" id="mvAdminPw" placeholder="輸入管理者密碼"></label>
        <button class="btn block" style="background:var(--danger); color:white;" onclick="moveAdminLogin()">登入</button>
      </div>
      <div id="mvAdminLoginMsg" class="error" style="margin-top:10px; text-align:center;"></div>
    </div>

    <div id="move-admin" class="card" style="display:none;">
      <div class="row" style="margin-bottom:15px;">
        <h3 style="color:var(--danger); margin:0;">⚙️ 管理者核對面板</h3>
        <button class="btn small row-right" onclick="location.reload()">登出</button>
      </div>
      
      <div class="row" style="background:#f8f9fa; padding:12px; border-radius:10px; margin-bottom:15px;">
        <label style="flex:1;">選擇專案：<select id="mvEventAdmin"></select></label>
        <button class="btn" onclick="refreshMovementsAndProgress()">🔄 刷新資料</button>
        <button class="btn" onclick="moveExportPdf()">📄 匯出 PDF</button>
      </div>

      <div style="font-size:14px; background:#e7f0ff; padding:10px; border-radius:8px; margin-bottom:15px; font-weight:500;">
        <div id="mvAdminProgMove" style="margin-bottom:5px;"></div>
        <div id="mvAdminProgVerify"></div>
      </div>

      <div class="tabs small" id="mvAdminTabs" role="tablist" style="background:#ffebee; border-color:#f5c6cb;">
        <button type="button" class="tab active" data-view="pending" style="color:var(--danger);">待確認 (<span id="mvTabCountPending">0</span>)</button>
        <button type="button" class="tab" data-view="verified" style="color:var(--success);">已確認 (<span id="mvTabCountVerified">0</span>)</button>
      </div>

      <div id="mvBulkBar" class="row" style="gap:8px; align-items:center; background:#f1f3f5; padding:8px; border-radius:8px; margin-bottom:10px;">
        <span class="muted" id="mvBulkHint" style="font-weight:bold; color:var(--accent);">未選取</span>
        <button class="btn small" type="button" onclick="adminSelectPage()">全選本頁</button>
        <button class="btn small" type="button" onclick="adminClearSelection()">清除選取</button>
        <button class="btn small" type="button" style="background:var(--success); color:white;" onclick="adminBulkVerify(true)">✅ 核准選取</button>
        <button class="btn small" type="button" style="background:var(--danger); color:white;" onclick="adminBulkVerify(false)">❌ 撤銷選取</button>
        <button class="btn small row-right" type="button" style="background:#ffc107;" onclick="adminOpenBulkInput(this)">📝 批次輸入暫存地點</button>
      </div>

      <div id="mvAreaBar" class="row" style="gap:8px; align-items:center; margin-bottom:8px;">
        <label>過濾區域：<select id="mvAreaFilter" style="min-width:180px; padding:6px;"></select></label>
        <input type="text" id="mvAreaSearch" placeholder="搜尋區域名稱" style="width:150px; padding:6px;">
        <button class="pill" id="mvOnlyHasBtn" data-only="has">有暫存</button>
        <button class="pill" id="mvOnlyEmptyBtn" data-only="empty">未填暫存</button>
        <div id="mvAreaChips" class="chips-inline row-right"></div>
      </div>

      <div id="mvBoxBar" class="row" style="gap:8px; align-items:center; margin-bottom:15px;">
        <label>過濾箱名：<select id="mvBoxFilter" style="min-width:180px; padding:6px;"></select></label>
        <input type="text" id="mvBoxSearch" placeholder="搜尋箱名" style="width:150px; padding:6px;">
        <div id="mvBoxChips" class="chips-inline row-right"></div>
      </div>

      <div style="overflow-x:auto; border:1px solid var(--border); border-radius:8px;">
        <table class="table" id="mvTable" style="min-width:800px;">
          <thead style="background:#f8f9fa;">
          <tr>
            <th style="width:100px;">核對/勾選</th>
            <th>藏品資訊</th>
            <th style="width:300px;">暫存地點（可就地修正）</th>
            <th>裝箱資訊</th>
            <th>人員紀錄</th>
            <th>時間與動作</th>
          </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="mvAdminMsg" class="muted" style="margin-top:10px; font-weight:bold; text-align:center;"></div>
    </div>
  </div>

  <div id="pageMask" class="mask" role="alert" aria-live="polite" aria-busy="false" hidden>
    <div class="mask-box">
      <span class="spinner" aria-hidden="true"></span>
      <span class="mask-msg" style="font-size:1.1rem; color:var(--success);">處理中…</span>
    </div>
  </div>

  <script>
    // ==========================================
    // ⚠️ 核心設定：請貼上您最新部署的 GAS API 網址！
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbzcLS6cuQji3qWiQ5ydLdTGueW96R2CZo1J0eEdILB-J0GP3kgWVqg5wNbykpr7OW-uIA/exec";

    // ★ 終極引擎：JSONP 雙通道穿透
    function callAPI(action, payload = {}) {
      return new Promise((resolve, reject) => {
        const callbackName = 'gas_cb_' + Math.round(100000 * Math.random());
        const query = encodeURIComponent(JSON.stringify({ action: action, payload: payload }));
        const url = API_URL + "?q=" + query + "&callback=" + callbackName;

        window[callbackName] = function(res) {
          delete window[callbackName];
          document.body.removeChild(script);
          if (!res.success) reject(new Error(res.error || res.msg || "未知錯誤"));
          else resolve(res.data);
        };
        const script = document.createElement('script');
        script.src = url;
        script.onerror = function() {
          delete window[callbackName];
          document.body.removeChild(script);
          reject(new Error("網路連線被阻擋或逾時，請確認 GAS API 設定。"));
        };
        document.body.appendChild(script);
      });
    }

    // ★ RPC 智慧轉接器：無縫銜接舊版邏輯
    function rpc(name, ...args) {
      let payload = {};
      if (name === 'recordScanWithFilter') payload = { qrCode: args[0], locations: args[1] };
      else if (name === 'getEventItemsByLocations') payload = { eventId: args[0], locations: args[1] };
      else if (args.length === 1) payload = args[0];
      else if (args.length > 1) payload = args;
      return callAPI(name, payload);
    }
    function rpcWithSoftTimeout(name, args, ms=15000) {
      return new Promise((resolve) => {
        let settled = false;
        const timer = setTimeout(() => { if (!settled) { settled=true; resolve({status: 'timeout'}); } }, ms);
        rpc(name, ...(args||[])).then(res => {
          if (settled) return; settled = true; clearTimeout(timer); resolve({status: 'ok', res});
        }).catch(err => {
          if (settled) return; settled = true; clearTimeout(timer); resolve({status: 'err', err});
        });
      });
    }

    /* ===== 小工具：偽輸入框 API ===== */
    function ceGet(id){ const el=document.getElementById(id); if(!el) return ''; return el.innerText.replace(/\s+/g,' ').trim(); }
    function ceSet(id, val){ const el=document.getElementById(id); if(!el) return; el.textContent = val || ''; }
    function ceOn(id, onInput, onEnter){
      const el=document.getElementById(id); if(!el) return;
      el.addEventListener('input', onInput);
      el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); onEnter && onEnter(); } });
    }

    /* ===== 共享狀態/函式 ===== */
    let html5QrCode, lastScanAt = 0;
    const selected = new Set();
    let allLocations = [];
    let zones = [], filteredZones = [];
    const zoneRefs = new Map(), sgRefs = new Map();
    window._subsetMaps = [];
    const viewMode = loadViewMode() || { cols: 1, dense: false };

    const queryState = {
      page: 1, total: 0, q: '',
      quick: { uncounted:false, counted:false, img:false, noimg:false, recent30:false },
      facets: { acqLevels:new Set(), jiangElems:new Set(), categories:new Set(), materials:new Set(), eras:new Set(), rectifies:new Set() },
      sort: 'time_desc', pageSize: 20,
    };
    let facetValues = { acqLevels:[], jiangElems:[], categories:[], materials:[], eras:[], rectifies:[] };

    function beep({freq=880, duration=120, type='sine'} = {}){ try{ const ctx=new (window.AudioContext||window.webkitAudioContext)(); const osc=ctx.createOscillator(); const g=ctx.createGain(); osc.type=type; osc.frequency.value=freq; osc.connect(g); g.connect(ctx.destination); g.gain.setValueAtTime(0.05, ctx.currentTime); osc.start(); setTimeout(()=>{osc.stop(); ctx.close();}, duration);}catch{} }
    function playSound(kind){ if(kind==='success') beep({freq:1100,duration:140,type:'triangle'}); else if(kind==='duplicate') beep({freq:550,duration:140,type:'square'}); else beep({freq:300,duration:200,type:'sawtooth'});}

    let _maskTimer = null;
    function showMask(msg='處理中…', delay=250){ const m=document.getElementById('pageMask'); m.querySelector('.mask-msg').textContent=msg; m.setAttribute('aria-busy','true'); clearTimeout(_maskTimer); _maskTimer=setTimeout(()=>{ m.hidden=false; }, delay); }
    function hideMask(){ const m=document.getElementById('pageMask'); clearTimeout(_maskTimer); _maskTimer=null; m.hidden=true; m.setAttribute('aria-busy','false'); }
    async function withMask(promiseOrFn, msg='處理中…', delay=250){ showMask(msg, delay); try{ return (typeof promiseOrFn==='function')?await promiseOrFn():await promiseOrFn; } finally{ hideMask(); } }

    /* ===== 四合一頂部分頁切換 ===== */
    document.addEventListener('click', (e) => {
      const tab = e.target.closest('.tabs[aria-label="主功能"] .tab'); if (!tab) return;
      if (html5QrCode) { try { html5QrCode.stop().then(()=>html5QrCode.clear()).catch(()=>{}); } catch {} }

      document.querySelectorAll('.tabs[aria-label="主功能"] .tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');

      const which = tab.dataset.tab; // inv | search | move | admin
      document.getElementById('invRoot').style.display = (which==='inv')? '' : 'none';
      document.getElementById('searchRoot').style.display = (which==='search')? '' : 'none';
      document.getElementById('moveRoot').style.display = (which==='move')? '' : 'none';
      document.getElementById('adminRoot').style.display = (which==='admin')? '' : 'none';

      if (which === 'move' || which === 'admin') initMoveAndAdmin();
    });

    /* ===== 盤點：模式 ===== */
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.segmented .seg'); if (!btn || !btn.closest('#mainPanel')) return;
      btn.parentElement.querySelectorAll('.seg').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('mode').value = btn.dataset.value;
      const partial = btn.dataset.value === 'partial';
      document.getElementById('zonePanel').style.display = partial ? 'block' : 'none';
      updateProgress();
    });

    /* ===== 分群 & 地點 UI（共用工具） ===== */
    const ZONES = [ { title: '西側典藏庫', test: /西側典藏庫/ }, { title: '東側大庫房', test: /東側大庫房/ }, { title: '東側小庫房', test: /東側小庫房/ }, { title: '常設展聽', test: /常設展[廳厅聽听]/ }, { title: '其他地點', test: /.*/ } ];
    function categorizeZone(value){ for (const z of ZONES) if (z.test.test(value)) return z.title; return '其他地點'; }
    function normalizeHyphen(s){ return s.replace(/[－–—]/g, '-'); }
    function splitSubgroup(value){
      const norm = normalizeHyphen(value); const idx = norm.lastIndexOf('-');
      if (idx > 0) { const suf = norm.slice(idx+1); if (/\d/.test(suf)) return { base: norm.slice(0, idx), label: suf }; }
      return { base: norm, label: '（無層位）' };
    }
    function buildZones(list){
      const map = new Map();
      list.forEach(loc => {
        const zTitle = categorizeZone(loc); const { base, label } = splitSubgroup(loc);
        const sg = map.get(zTitle)?.get(base) || { key: base, title: base, items: [] };
        if (!map.get(zTitle)) map.set(zTitle, new Map());
        sg.items.push({ value: loc, label }); map.get(zTitle).set(base, sg);
      });
      const collator = new Intl.Collator(undefined, { numeric:true, sensitivity:'base' });
      const result = [];
      for (const z of ZONES) {
        const subMap = map.get(z.title); if (!subMap) continue;
        const subs = Array.from(subMap.values()); subs.sort((a,b)=>collator.compare(a.title, b.title));
        subs.forEach(sg => {
          sg.items.sort((a,b)=>collator.compare(a.label, b.label));
          sg.singleNoLevel = (sg.items.length === 1 && sg.items[0].label === '（無層位）');
          const short = sg.title.replace(z.title, '').replace(/^[\s-]+/, ''); sg.titleShort = short || sg.title;
        });
        result.push({ title: z.title, subgroups: subs });
      }
      return result;
    }

    /* ===== 盤點：地點 UI ===== */
    function renderZones(list){
      const host = document.getElementById('zoneList'); host.innerHTML = ''; zoneRefs.clear(); sgRefs.clear();
      list.forEach(zone => {
        const zDetails = document.createElement('details'); zDetails.className = 'zone';
        if (zone.subgroups.some(sg => sg.open)) zDetails.setAttribute('open', '');
        const zSummary = document.createElement('summary');
        zSummary.innerHTML = `<span class="z-title">${zone.title}</span><span class="sm-right"><span></span><span class="chips-inline"></span></span>`;
        zDetails.appendChild(zSummary);

        const zTools = document.createElement('div'); zTools.className = 'toolbar';
        zTools.innerHTML = `<button class="small" type="button">全選本區</button><button class="small" type="button">清除本區</button>`;
        zTools.children[0].onclick = ()=>{ zone.subgroups.forEach(sg=> sg.items.forEach(it=>selected.add(it.value))); updateZoneVisual(zone); };
        zTools.children[1].onclick = ()=>{ zone.subgroups.forEach(sg=> sg.items.forEach(it=>selected.delete(it.value))); updateZoneVisual(zone); };
        zDetails.appendChild(zTools);

        const zCount = zSummary.querySelector('.sm-right span:first-child');
        const zChips = zSummary.querySelector('.chips-inline');

        zone.subgroups.forEach(sg => {
          const sDetails = document.createElement('details'); sDetails.className='subgroup'; if (sg.singleNoLevel) sDetails.classList.add('single');
          if (sg.open) sDetails.setAttribute('open',''); 

          const sSummary = document.createElement('summary');
          sSummary.innerHTML = `<span class="g-title">${sg.titleShort}</span><span class="sm-right"><span></span><span class="chips-inline"></span></span>`;
          sDetails.appendChild(sSummary);
          const sCount = sSummary.querySelector('.sm-right span:first-child');
          const sChips = sSummary.querySelector('.chips-inline');

          if (sg.singleNoLevel) {
            sSummary.addEventListener('click', (e) => {
              e.preventDefault(); const only = sg.items[0].value;
              if (selected.has(only)) selected.delete(only); else selected.add(only);
              updateSubgroupVisual(zone, sg);
            });
          } else {
            const sTools = document.createElement('div'); sTools.className='toolbar';
            sTools.innerHTML = `<button class="small" type="button">全選</button><button class="small" type="button">清除</button>`;
            sTools.children[0].onclick = ()=>{ sg.items.forEach(it=>selected.add(it.value)); updateSubgroupVisual(zone, sg); };
            sTools.children[1].onclick = ()=>{ sg.items.forEach(it=>selected.delete(it.value)); updateSubgroupVisual(zone, sg); };
            sDetails.appendChild(sTools);

            const grid = document.createElement('div'); grid.className='grid';
            sg.items.forEach(it=>{
              const el = document.createElement('div'); el.className = 'tag' + (selected.has(it.value) ? ' selected' : '');
              el.textContent = it.label; el.title = it.value;
              el.onclick = ()=>{ if (selected.has(it.value)) selected.delete(it.value); else selected.add(it.value); el.classList.toggle('selected', selected.has(it.value)); updateSubgroupVisual(zone, sg); };
              grid.appendChild(el);
            });
            sDetails.appendChild(grid);
          }

          zDetails.appendChild(sDetails);
          sgRefs.set(zone.title+'|'+sg.key, { countEl: sCount, chipsEl: sChips, gridEl: sDetails.querySelector('.grid') || null, summaryEl: sSummary, sg, zone });
          updateSubgroupVisual(zone, sg);
        });
        host.appendChild(zDetails);
        zoneRefs.set(zone.title, { countEl: zCount, chipsEl: zChips, zone }); updateZoneVisual(zone);
      });
    }
    function updateSubgroupVisual(zone, sg){
      const ref = sgRefs.get(zone.title+'|'+sg.key); if (!ref) return;
      const picked = sg.items.filter(it=>selected.has(it.value));
      ref.countEl.textContent = `已選 ${picked.length}/${sg.items.length}`;
      const head = picked.slice(0, 6).map(it=>`<span class="chip">${it.label}</span>`).join('');
      ref.chipsEl.innerHTML = head + (picked.length>6?`<span class="chip">+${picked.length-6}</span>`:'');
      if (ref.gridEl) Array.from(ref.gridEl.children).forEach((el, idx)=>{ const it=sg.items[idx]; el.classList.toggle('selected', selected.has(it.value)); });
      if (sg.singleNoLevel && ref.summaryEl) ref.summaryEl.classList.toggle('selected', picked.length > 0);
      updateZoneVisual(zone);
    }
    function updateZoneVisual(zone){
      const ref = zoneRefs.get(zone.title); if (!ref) return;
      const allItems = zone.subgroups.flatMap(sg=>sg.items);
      const picked = allItems.filter(it=>selected.has(it.value));
      ref.countEl.textContent = `已選 ${picked.length}/${allItems.length}`;
      const head = picked.slice(0, 6).map(it=>`<span class="chip">${it.label}</span>`).join('');
      ref.chipsEl.innerHTML = head + (picked.length>6?`<span class="chip">+${picked.length-6}</span>`:'');
    }

    function matches(str, q){ return (str||'').toLowerCase().includes(q); }
    function applyFilter(){
      const q = ceGet('locationSearchCE').toLowerCase();
      filteredZones = zones.map(zone=>{
        const zoneHit = q && matches(zone.title, q);
        const subs = zone.subgroups.map(sg=>{
          const sgHit = q && (matches(sg.title, q) || matches(sg.titleShort, q));
          let items; if (!q) items = sg.items.slice(); else if (zoneHit || sgHit) items = sg.items.slice(); else items = sg.items.filter(it => matches(it.label, q) || matches(it.value, q));
          return { ...sg, items, open: !!q && (zoneHit || sgHit || items.length>0) };
        }).filter(sg => sg.items.length>0);
        const keep = subs.length>0 || zoneHit || !q;
        return keep ? { title: zone.title, subgroups: subs } : null;
      }).filter(Boolean);
      renderZones(filteredZones);
    }
    function selectAllVisible(){ filteredZones.forEach(z => z.subgroups.forEach(sg => sg.items.forEach(it => selected.add(it.value)))); renderZones(filteredZones); }
    function invertVisible(){ const vis=[]; filteredZones.forEach(z => z.subgroups.forEach(sg => sg.items.forEach(it => vis.push(it.value)))); vis.forEach(v => { if (selected.has(v)) selected.delete(v); else selected.add(v); }); renderZones(filteredZones); }
    function clearAll(){ selected.clear(); renderZones(filteredZones); }
    function getSelectedArray(){ return Array.from(selected); }

    async function loadLocations(){
      try{
        const locations = await withMask(rpc('getLocations'), '載入地點資料…');
        allLocations = locations || []; zones = buildZones(allLocations); filteredZones = zones.slice();
        renderZones(filteredZones); renderPresets();
      }catch(err){ document.getElementById('zoneList').innerHTML = `<div class="error">載入地點失敗：${err.message}</div>`; }
    }

    function getPresets(){ try { return JSON.parse(localStorage.getItem('inventory_presets')||'[]'); } catch { return []; } }
    function setPresets(list){ localStorage.setItem('inventory_presets', JSON.stringify(list)); }
    function renderPresets(){
      const row = document.getElementById('presetRow'); row.innerHTML = ''; const presets = getPresets();
      if (presets.length===0) { row.innerHTML='<div class="muted">尚未建立常用組合</div>'; return; }
      presets.forEach(p=>{
        const wrap=document.createElement('div'); wrap.style.display='flex'; wrap.style.gap='6px'; wrap.style.alignItems='center';
        wrap.innerHTML = `<button class="btn small" title="${p.locations.join('、')}">${p.name}</button><button class="btn small text-danger">刪除</button>`;
        wrap.children[0].onclick=()=>applyPreset(p.name);
        wrap.children[1].onclick=()=>{ if(confirm(`刪除「${p.name}」？`)){ setPresets(getPresets().filter(x=>x.name!==p.name)); renderPresets(); } };
        row.appendChild(wrap);
      });
    }
    function savePreset(){ if (selected.size===0) { alert('請先勾選至少一個位置'); return; } const name=prompt('為此組合命名'); if(!name) return;
      const presets=getPresets(); const payload={ name, locations:Array.from(selected) }; const idx=presets.findIndex(p=>p.name===name);
      if(idx>=0) presets[idx]=payload; else presets.push(payload); setPresets(presets); renderPresets(); alert('已儲存'); }
    function applyPreset(name){ const p=getPresets().find(p=>p.name===name); if(!p) return; selected.clear(); p.locations.forEach(loc=>{ if(allLocations.includes(loc)) selected.add(loc); }); ceSet('locationSearchCE',''); filteredZones=zones.slice(); renderZones(filteredZones); }

    /* ===== 盤點流程 (已加入強制喚醒相機) ===== */
    async function startInventory(){
      const mode = document.getElementById('mode').value;
      if (mode==='partial' && selected.size===0) { alert('請至少選擇一個位置/層位'); return; }
      
      try { const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); stream.getTracks().forEach(track => track.stop()); } catch (err) { return alert("⚠️ 無法取得相機權限！請檢查設定。\n" + err); }
      
      document.getElementById('mainPanel').style.display='none';
      document.getElementById('scanPanel').style.display='block';
      document.getElementById('info').style.display='none';
      updateProgress(); startScanner();
    }
    function returnToMain(){ document.getElementById('scanPanel').style.display='none'; document.getElementById('mainPanel').style.display='block'; if (html5QrCode) { html5QrCode.stop().then(()=>html5QrCode.clear()).catch(()=>{}); } }
    function endInventorySession(){ returnToMain(); }
    
    function startScanner(){
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start({ facingMode:"environment" }, { fps:10, qrbox:{width:250,height:250} }, msg => submitScan(msg), _err => {})
      .catch(err=>{ document.getElementById('reader').innerHTML = `<div class="error p-3">⚠️ 鏡頭初始化失敗<br><small>${esc(String(err))}</small></div>`; });
    }
    async function submitScan(qrCode){
      const now = Date.now(); if (now - lastScanAt < 800) return; lastScanAt = now;
      if (!qrCode) return;
      const selectedArr = getSelectedArray();
      const infoBox = document.getElementById('info'); infoBox.style.display='block';
      infoBox.innerHTML = `<div class="muted">⏳ 雲端核對中... (${esc(qrCode.split('\n')[0])})</div>`;
      try{
        const res = await rpc('recordScanWithFilter', qrCode, selectedArr);
        if (res.status === 'success') {
          if (res.duplicate) { playSound('duplicate'); infoBox.innerHTML = `<div class="error">⚠️ 此文物剛剛已盤點過：${esc(res.name)}</div>`; } 
          else {
            playSound('success');
            infoBox.innerHTML = `<div class="success mb-2">✅ 已盤點成功</div><strong>文物名稱：</strong>${esc(res.name)}<br><strong>典藏地點：</strong>${esc(res.location)}<br><strong>盤點時間：</strong>${esc(res.time)}<br><strong>說明：</strong>${esc(res.desc)}<br><img class="art-img mt-2" src="${esc(res.image)}" onerror="this.style.display='none'">`;
            updateProgress();
          }
        } else { playSound('error'); infoBox.innerHTML = `<div class="error">${esc(res.message)}</div>`; }
      }catch(err){ playSound('error'); infoBox.innerHTML = `<div class="error">掃描寫入失敗：${err.message}</div>`; }
    }
    async function updateProgress(){
      const selectedArr = (document.getElementById('mode').value==='partial') ? getSelectedArray() : [];
      try{
        const partial = document.getElementById('mode').value === 'partial';
        const data = await rpc('getInventoryProgress', selectedArr);
        const stats = partial ? await rpc('getLocationStats', selectedArr) : null;
        
        const percent = data.total>0 ? Math.round(data.counted/data.total*100) : 0;
        const bar = document.getElementById('progressBar'); bar.style.width = percent+'%'; bar.textContent = percent+'%';
        document.getElementById('progressText').innerHTML = `✅ 已盤點：${data.counted} 　|　📦 總數：${data.total} 　|　⏳ 剩餘：${data.remaining}`;
        if (partial && stats) renderRemainingBreakdown(stats); else document.getElementById('remainingBreakdown').innerHTML = '';
      }catch(err){ document.getElementById('progressText').innerHTML = `<span class="error">取得進度失敗：${err.message}</span>`; }
    }
    function renderRemainingBreakdown(stats){
      const box = document.getElementById('remainingBreakdown'); const collator = new Intl.Collator(undefined, { numeric:true, sensitivity:'base' });
      const zoneMap = new Map(); window._subsetMaps = [];
      stats.forEach(s => {
        if (!s || s.total === 0) return; const zTitle = categorizeZone(s.location); const { base } = splitSubgroup(s.location);
        const z = zoneMap.get(zTitle) || new Map(); const sg = z.get(base) || { title: base, total:0, counted:0, remaining:0, locs:new Set() };
        sg.total += s.total; sg.counted += s.counted; sg.remaining += (s.total - s.counted); sg.locs.add(s.location); z.set(base, sg); zoneMap.set(zTitle, z);
      });
      const zonesData = [];
      for (const [zTitle, subMap] of zoneMap) {

    const CHIPS = {};
    function chipsInit(containerId){
      const wrap = document.getElementById(containerId); if (!wrap || CHIPS[containerId]) return CHIPS[containerId];
      const input = wrap.querySelector('input');
      function addChip(text){
        const name = String(text||'').trim(); if (!name) { input.value=''; return; }
        if (Array.from(wrap.querySelectorAll('.chip')).some(c => (c.dataset.v||'')===name)){ input.value=''; return; }
        const chip = document.createElement('span'); chip.className='chip'; chip.dataset.v=name;
        chip.innerHTML = `<span>${name}</span><button type="button" class="x">×</button>`;
        chip.querySelector('.x').onclick=()=>chip.remove(); wrap.insertBefore(chip, input); input.value='';
      }
      function commit(){ if (input && input.value && input.value.trim()) addChip(input.value); }
      input.addEventListener('keydown', (e)=>{ if (e.key==='Enter' || e.key===','){ e.preventDefault(); addChip(input.value); }else if(e.key==='Backspace' && !input.value){ const all=wrap.querySelectorAll('.chip'); if (all.length) all[all.length-1].remove(); } });
      input.addEventListener('blur', ()=>commit());
      CHIPS[containerId] = { add: addChip, commit, values(){ return Array.from(wrap.querySelectorAll('.chip')).map(c=>c.dataset.v||''); }, clear(){ Array.from(wrap.querySelectorAll('.chip')).forEach(c=>c.remove()); input.value=''; } };
      return CHIPS[containerId];
    }

      document.body.appendChild(_pop); Object.assign(_pop.style, { left: (rect.left + window.scrollX - 200) + 'px', top: (rect.bottom + 4 + window.scrollY) + 'px' }); window.addEventListener('click', _autoCloseOnce, { once:true });
    }
    async function adminConfirmBulkTemp(){ const temp = (document.getElementById('_bulkTempInput')?.value||'').trim(); if (!temp) return alert('請輸入暫存地點'); closePickList(); await adminDoBulkTemp(temp); }
    async function rowApplyTempToSelected(moveId){ const temp = (document.getElementById('tmp_'+moveId)?.value||'').trim(); if (!temp) return alert('請先在此列輸入暫存地點'); await adminDoBulkTemp(temp); }
    async function adminDoBulkTemp(newTemp){
      const ids = Array.from(MV_ADMIN_SEL); if (!ids.length) return alert('請先勾選資料'); const evId = document.getElementById('mvEventAdmin').value || ''; if (!evId) return alert('請選擇事件');
      const snap = snapshotTemps(ids); const changed = mutateLocalTemp(ids, newTemp); if (!changed){ document.getElementById('mvAdminMsg').textContent = '無可更新筆數'; return; }
      document.getElementById('mvAdminMsg').textContent = `已套用至 ${ids.length} 筆（同步中…）`;
      const tryBatch = await rpcWithSoftTimeout('adminBulkUpdateTemp', [{ eventId: evId, moveIds: ids, temp: newTemp }]);
      if (tryBatch.status==='ok' && tryBatch.res?.ok) document.getElementById('mvAdminMsg').innerHTML = `<span class="success">已同步主表 (${ids.length} 筆)</span>`; else { rollbackTemps(snap); document.getElementById('mvAdminMsg').innerHTML = `<span class="error">同步失敗，已退回原狀態</span>`; }
    }
    function mutateLocalTemp(moveIds, newTemp){ const set = new Set(moveIds); let changed = 0; for (const mv of MV_ADMIN_LAST){ if (set.has(mv.MoveID)){ if ((mv['暫存地點']||'') !== newTemp){ mv['暫存地點'] = newTemp; changed++; } } } if (changed){ renderMvTable(MV_ADMIN_LAST); renderAdminProgressBars(MV_ADMIN_LAST); } return changed; }
    function snapshotTemps(moveIds){ const snap = new Map(); const set = new Set(moveIds); for (const mv of MV_ADMIN_LAST){ if (set.has(mv.MoveID)) snap.set(mv.MoveID, mv['暫存地點']||''); } return snap; }
    function rollbackTemps(snap, idsToRollback=null){ const ids = idsToRollback ? idsToRollback : Array.from(snap.keys()); const set = new Set(ids); for (const mv of MV_ADMIN_LAST){ if (set.has(mv.MoveID) && snap.has(mv.MoveID)) mv['暫存地點'] = snap.get(mv.MoveID); } renderMvTable(MV_ADMIN_LAST); renderAdminProgressBars(MV_ADMIN_LAST); }

    /* ===== 系統初始啟動 ===== */
    window.addEventListener('load', async () => {
      document.getElementById('invRoot').style.display = '';
      await loadLocations();
      setViewMode(viewMode.cols || 1, !!viewMode.dense);
      hideLoading();
    });
  </script>
